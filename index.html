<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>SIWÁ Boutique | Moda Infantil</title>
    
    <meta name="description" content="Moda infantil exclusiva en Pococí. Ropa para bebés, niños y niñas con estilo premium.">
    <link rel="icon" href="favicon.ico" type="image/x-icon">

    <link href="https://fonts.googleapis.com/css2?family=Cormorant+Garamond:wght@600&family=Outfit:wght@300;500;700&display=swap" rel="stylesheet">
    
    <link rel="stylesheet" href="estilos.css">
    
    <script src="https://unpkg.com/react@18/umd/react.production.min.js"></script>
    <script src="https://unpkg.com/react-dom@18/umd/react-dom.production.min.js"></script>
    <script src="https://unpkg.com/@babel/standalone/babel.min.js"></script>
    <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
</head>
<body>

    <div id="root">
        <div style="height: 100vh; display: flex; flex-direction: column; justify-content: center; align-items: center; background: #0a1f1a;">
            <p style="color: #d46a4e; font-family: 'Outfit', sans-serif; letter-spacing: 2px; margin-bottom: 10px;">CARGANDO SIWÁ...</p>
            <div style="width: 40px; height: 2px; background: rgba(212, 106, 78, 0.3); position: relative; overflow: hidden;">
                <div style="position: absolute; width: 20px; height: 100%; background: #d46a4e; animation: load 1.5s infinite ease-in-out;"></div>
            </div>
        </div>
    </div>

    <style>
        @keyframes load {
            0% { left: -100%; }
            100% { left: 100%; }
        }
    </style>

    <script type="text/babel" src="index.js"></script>

</body>
</html>
