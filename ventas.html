<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Control Financiero | Siwa Boutique</title>
    <link href="https://fonts.googleapis.com/css2?family=Outfit:wght@300;400;600&family=Playfair+Display:wght@700&display=swap" rel="stylesheet">
    <script src="https://unpkg.com/react@18/umd/react.development.js"></script>
    <script src="https://unpkg.com/react-dom@18/umd/react-dom.development.js"></script>
    <script src="https://unpkg.com/@babel/standalone/babel.min.js"></script>
    <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
    <style>
        :root { 
            --azul-navy: #1a2a3a;
            --verde-fino: #2d5a4c;
            --naranja-accent: #e67e22;
            --bg-claro: #f4f7f6;
            --blanco: #ffffff;
            --texto: #2c3e50;
            --danger: #d63031;
            --subtle: #f8f9fa;
        }

        body { font-family: 'Outfit', sans-serif; background: var(--bg-claro); margin: 0; padding: 0; color: var(--texto); }
        
        header {
            background: var(--azul-navy);
            color: white;
            padding: 15px 5%;
            display: flex;
            justify-content: space-between;
            align-items: center;
            position: sticky;
            top: 0;
            z-index: 100;
        }

        .container { padding: 30px 5%; max-width: 1300px; margin: 0 auto; }

        .stats-grid {
            display: grid;
            grid-template-columns: repeat(auto-fit, minmax(220px, 1fr));
            gap: 20px;
            margin-bottom: 30px;
        }

        .stat-card {
            background: white;
            padding: 20px;
            border-radius: 20px;
            box-shadow: 0 4px 15px rgba(0,0,0,0.03);
            border-bottom: 4px solid #ddd;
        }

        .stat-card h3 { margin: 0; font-size: 0.85rem; color: #7f8c8d; text-transform: uppercase; letter-spacing: 1px; }
        .stat-card p { margin: 8px 0 0; font-size: 1.6rem; font-weight: 600; }
        
        .card-total { border-color: var(--azul-navy); }
        .card-iva { border-color: var(--naranja-accent); }
        .card-profit { border-color: var(--verde-fino); color: var(--verde-fino); }
        .card-pending { border-color: #f1c40f; }

        .table-container {
            background: white;
            border-radius: 25px;
            overflow: hidden;
            box-shadow: 0 10px 30px rgba(0,0,0,0.05);
        }

        table { width: 100%; border-collapse: collapse; min-width: 800px; }
        thead { background: var(--subtle); }
        th { padding: 18px; text-align: left; color: #7f8c8d; font-size: 0.9rem; }
        td { padding: 18px; border-bottom: 1px solid #f1f1f1; font-size: 0.95rem; }

        .badge { padding: 5px 12px; border-radius: 12px; font-size: 0.75rem; font-weight: 600; text-transform: uppercase; }
        .badge-pending { background: #fff3e0; color: #e67e22; }
        .badge-completed { background: #e8f5e9; color: #2d5a4c; }

        .btn-confirm { 
            background: var(--verde-fino); color: white; border: none; 
            padding: 8px 16px; border-radius: 10px; cursor: pointer; font-weight: 600;
        }
        .btn-confirm:hover { transform: scale(1.05); background: #1e3d33; }
        .btn-back { color: white; text-decoration: none; font-size: 0.9rem; display: flex; align-items: center; gap: 5px; }
        .txt-small { font-size: 0.75rem; color: #95a5a6; display: block; }
    </style>
</head>
<body>
    <div id="root"></div>
    <script type="text/babel">
        const { useState, useEffect } = React;
        
        // Cliente de Supabase conectado a tu proyecto
        const _supabase = supabase.createClient('https://hvnpkljyoocqdzwdptgt.supabase.co', 'eyJhbGciOiJIUzI1NiIsInR5cCI6IkpXVCJ9.eyJpc3MiOiJzdXBhYmFzZSIsInJlZiI6Imh2bnBrbGp5b29jcWR6d2RwdGd0Iiwicm9sZSI6ImFub24iLCJpYXQiOjE3NzY2MTAxMTQsImV4cCI6MjA5MjE4NjExNH0.-pq3iVzqJsJCyGNXkFPlHSIQeBTrr7i7ptsY6FYjJZ0');

        function App() {
            const [sales, setSales] = useState([]);
            const [metrics, setMetrics] = useState({ total: 0, iva: 0, profit: 0, pending: 0 });

            useEffect(() => { fetchSales(); }, []);

            async function fetchSales() {
                // Jala los datos directamente de la tabla 'sales' que vimos en tus capturas
                const { data, error } = await _supabase
                    .from('sales')
                    .select('*')
                    .order('created_at', { ascending: false });
                
                if (error) {
                    console.error("Error cargando ventas:", error);
                    return;
                }

                if (data) {
                    setSales(data);
                    calculateMetrics(data);
                }
            }

            function calculateMetrics(allSales) {
                // Filtramos solo las completadas para las métricas de dinero real
                const completed = allSales.filter(s => s.status === 'completed');
                
                // total_amount y total_profit vienen de tu tabla en Supabase
                const totalVentas = completed.reduce((acc, s) => acc + Number(s.total_amount || 0), 0);
                const totalIVA = totalVentas - (totalVentas / 1.13); 
                const gananciaBruta = completed.reduce((acc, s) => acc + Number(s.total_profit || 0), 0);
                
                setMetrics({
                    total: totalVentas,
                    iva: totalIVA,
                    profit: gananciaBruta,
                    pending: allSales.filter(s => s.status === 'pending').length
                });
            }

            async function confirmSale(id) {
                if(!confirm("¿Deseas confirmar esta venta? Esto ejecutará la lógica de inventario en la base de datos.")) return;
                
                // Llama a la función RPC 'confirm_sale' que debe estar en tu Supabase
                // Esta función es la que debe cambiar el estado a 'completed' y restar stock
                const { error } = await _supabase.rpc('confirm_sale', { p_sale_id: id });
                
                if (error) {
                    alert("Error al confirmar: " + error.message);
                } else {
                    fetchSales(); // Recarga los datos para ver los cambios
                }
            }

            return (
                <div>
                    <header>
                        <a href="index.html" className="btn-back"><span>←</span> Volver a Tienda</a>
                        <h1 style={{fontFamily: 'Playfair Display', margin: 0, fontSize: '1.2rem'}}>SIWA FINANCE</h1>
                        <div style={{width: '100px'}}></div>
                    </header>

                    <main className="container">
                        <div className="stats-grid">
                            <div className="stat-card card-total">
                                <h3>Ingresos Totales</h3>
                                <p>₡{metrics.total.toLocaleString('es-CR')}</p>
                                <span className="txt-small">Ventas pagadas (IVA incl.)</span>
                            </div>
                            <div className="stat-card card-iva">
                                <h3>IVA por Reservar</h3>
                                <p>₡{Math.round(metrics.iva).toLocaleString('es-CR')}</p>
                                <span className="txt-small">Monto del 13% recolectado</span>
                            </div>
                            <div className="stat-card card-profit">
                                <h3>Ganancia Real</h3>
                                <p>₡{metrics.profit.toLocaleString('es-CR')}</p>
                                <span className="txt-small">Basado en costo de prendas</span>
                            </div>
                            <div className="stat-card card-pending">
                                <h3>Por Confirmar</h3>
                                <p>{metrics.pending}</p>
                                <span className="txt-small">Pedidos pendientes de pago</span>
                            </div>
                        </div>

                        <div className="table-container">
                            <table>
                                <thead>
                                    <tr>
                                        <th>Fecha y Cliente</th>
                                        <th>Desglose (₡)</th>
                                        <th>Total Cobrado</th>
                                        <th>Estado</th>
                                        <th>Acción</th>
                                    </tr>
                                </thead>
                                <tbody>
                                    {sales.map(sale => {
                                        const subtotal = Number(sale.total_amount) / 1.13;
                                        const iva = Number(sale.total_amount) - subtotal;
                                        return (
                                            <tr key={sale.id}>
                                                <td>
                                                    <strong>{sale.customer_name || 'Cliente Web'}</strong>
                                                    <span className="txt-small">{new Date(sale.created_at).toLocaleDateString()}</span>
                                                </td>
                                                <td>
                                                    <div className="txt-small">Subtotal: ₡{Math.round(subtotal).toLocaleString()}</div>
                                                    <div className="txt-small">IVA (13%): ₡{Math.round(iva).toLocaleString()}</div>
                                                    <div className="txt-small" style={{color: 'var(--verde-fino)'}}>Ganancia: ₡{Number(sale.total_profit || 0).toLocaleString()}</div>
                                                </td>
                                                <td style={{ fontWeight: '600', color: 'var(--azul-navy)' }}>
                                                    ₡{Number(sale.total_amount).toLocaleString('es-CR')}
                                                </td>
                                                <td>
                                                    <span className={`badge badge-${sale.status}`}>
                                                        {sale.status === 'pending' ? 'Pendiente' : 'Pagado'}
                                                    </span>
                                                </td>
                                                <td>
                                                    {sale.status === 'pending' ? (
                                                        <button className="btn-confirm" onClick={() => confirmSale(sale.id)}>
                                                            Confirmar Pago
                                                        </button>
                                                    ) : (
                                                        <span style={{color: '#bdc3c7', fontSize: '0.8rem'}}>✓ Inventario actualizado</span>
                                                    )}
                                                </td>
                                            </tr>
                                        )
                                    })}
                                </tbody>
                            </table>
                        </div>
                    </main>
                </div>
            );
        }
        ReactDOM.createRoot(document.getElementById('root')).render(<App />);
    </script>
</body>
</html>
