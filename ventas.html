<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Control Financiero | Siwa Boutique</title>
    <link href="https://fonts.googleapis.com/css2?family=Outfit:wght@300;400;600&family=Playfair+Display:wght@700&display=swap" rel="stylesheet">
    <script src="https://unpkg.com/react@18/umd/react.development.js"></script>
    <script src="https://unpkg.com/react-dom@18/umd/react-dom.development.js"></script>
    <script src="https://unpkg.com/@babel/standalone/babel.min.js"></script>
    <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
    <style>
        :root { 
            --azul-navy: #1a2a3a;
            --verde-fino: #2d5a4c;
            --naranja-accent: #e67e22;
            --bg-claro: #f4f7f6;
            --blanco: #ffffff;
            --texto: #2c3e50;
            --danger: #d63031;
            --subtle: #f8f9fa;
        }

        body { font-family: 'Outfit', sans-serif; background: var(--bg-claro); margin: 0; padding: 0; color: var(--texto); }
        
        header {
            background: var(--azul-navy);
            color: white;
            padding: 15px 5%;
            display: flex;
            justify-content: space-between;
            align-items: center;
            position: sticky;
            top: 0;
            z-index: 100;
        }

        .container { padding: 30px 5%; max-width: 1300px; margin: 0 auto; }

        .stats-grid {
            display: grid;
            grid-template-columns: repeat(auto-fit, minmax(220px, 1fr));
            gap: 20px;
            margin-bottom: 30px;
        }

        .stat-card {
            background: white;
            padding: 20px;
            border-radius: 20px;
            box-shadow: 0 4px 15px rgba(0,0,0,0.03);
            border-bottom: 4px solid #ddd;
        }

        .stat-card h3 { margin: 0; font-size: 0.85rem; color: #7f8c8d; text-transform: uppercase; letter-spacing: 1px; }
        .stat-card p { margin: 8px 0 0; font-size: 1.6rem; font-weight: 600; }
        
        .card-total { border-color: var(--azul-navy); }
        .card-iva { border-color: var(--naranja-accent); }
        .card-profit { border-color: var(--verde-fino); color: var(--verde-fino); }
        .card-pending { border-color: #f1c40f; }

        .table-container {
            background: white;
            border-radius: 25px;
            overflow: hidden;
            box-shadow: 0 10px 30px rgba(0,0,0,0.05);
        }

        table { width: 100%; border-collapse: collapse; min-width: 800px; }
        thead { background: var(--subtle); }
        th { padding: 18px; text-align: left; color: #7f8c8d; font-size: 0.9rem; }
        td { padding: 18px; border-bottom: 1px solid #f1f1f1; font-size: 0.95rem; }

        .badge { padding: 5px 12px; border-radius: 12px; font-size: 0.75rem; font-weight: 600; text-transform: uppercase; }
        .badge-pending { background: #fff3e0; color: #e67e22; }
        .badge-completed { background: #e8f5e9; color: #2d5a4c; }
        .badge-cancelled { background: #ffebee; color: #d63031; }

        .btn-confirm { 
            background: var(--verde-fino); color: white; border: none; 
            padding: 8px 12px; border-radius: 10px; cursor: pointer; font-weight: 600;
            margin-bottom: 5px; width: 100%;
        }
        .btn-cancel {
            background: #fdf0f0; color: var(--danger); border: 1px solid #fadbd8;
            padding: 6px 12px; border-radius: 10px; cursor: pointer; font-size: 0.75rem;
            width: 100%;
        }
        .btn-confirm:hover { background: #1e3d33; }
        .btn-cancel:hover { background: #f9ebeb; }

        .btn-back { color: white; text-decoration: none; font-size: 0.9rem; display: flex; align-items: center; gap: 5px; }
        .txt-small { font-size: 0.75rem; color: #95a5a6; display: block; }
        .actions-cell { display: flex; flex-direction: column; gap: 4px; min-width: 140px; }
    </style>
</head>
<body>
    <div id="root"></div>
    <script type="text/babel">
        const { useState, useEffect } = React;
        
        const _supabase = supabase.createClient('https://hvnpkljyoocqdzwdptgt.supabase.co', 'eyJhbGciOiJIUzI1NiIsInR5cCI6IkpXVCJ9.eyJpc3MiOiJzdXBhYmFzZSIsInJlZiI6Imh2bnBrbGp5b29jcWR6d2RwdGd0Iiwicm9sZSI6ImFub24iLCJpYXQiOjE3NzY2MTAxMTQsImV4cCI6MjA5MjE4NjExNH0.-pq3iVzqJsJCyGNXkFPlHSIQeBTrr7i7ptsY6FYjJZ0');

        function App() {
            const [sales, setSales] = useState([]);
            const [loading, setLoading] = useState(true);
            const [metrics, setMetrics] = useState({ total: 0, iva: 0, profit: 0, pending: 0 });

            useEffect(() => { fetchSales(); }, []);

            async function fetchSales() {
                try {
                    setLoading(true);
                    const { data, error } = await _supabase
                        .from('sales')
                        .select('*')
                        .order('created_at', { ascending: false });
                    
                    if (error) throw error;
                    if (data) {
                        setSales(data);
                        calculateMetrics(data);
                    }
                } catch (err) {
                    console.error("Error:", err.message);
                } finally {
                    setLoading(false);
                }
            }

            function calculateMetrics(allSales) {
                const completed = allSales.filter(s => s.status === 'completed');
                
                // 1. Ingresos Totales (Bruto)
                const totalVentasBruto = completed.reduce((acc, s) => acc + Number(s.total_amount || 0), 0);
                
                // 2. Cálculo de IVA (13% incluido en el total)
                const totalIVA = totalVentasBruto - (totalVentasBruto / 1.13); 
                
                // 3. Ganancia Real (Ingreso Bruto - IVA)
                const gananciaRealTotal = totalVentasBruto - totalIVA;
                
                setMetrics({
                    total: totalVentasBruto,
                    iva: totalIVA,
                    profit: gananciaRealTotal,
                    pending: allSales.filter(s => s.status === 'pending').length
                });
            }

            async function confirmSale(sale) {
                if(!confirm("¿Confirmar pago y actualizar inventario?")) return;
                
                const { error: updateError } = await _supabase
                    .from('sales')
                    .update({ status: 'completed' })
                    .eq('id', sale.id);

                if (updateError) {
                    alert("Error: " + updateError.message);
                    return;
                }

                if (sale.product_id) {
                    const { data: productData } = await _supabase
                        .from('productos')
                        .select('stock')
                        .eq('id', sale.product_id)
                        .single();

                    if (productData) {
                        const newStock = Math.max(0, (productData.stock || 0) - 1);
                        await _supabase
                            .from('productos')
                            .update({ stock: newStock })
                            .eq('id', sale.product_id);
                    }
                }

                await _supabase.rpc('confirm_sale', { p_sale_id: sale.id });
                fetchSales();
            }

            async function cancelSale(id) {
                if(!confirm("¿Anular esta venta?")) return;
                const { error } = await _supabase
                    .from('sales')
                    .update({ status: 'cancelled' })
                    .eq('id', id);
                if (error) alert(error.message);
                else fetchSales();
            }

            return (
                <div>
                    <header>
                        <a href="admin.html" className="btn-back"><span>←</span> Volver</a>
                        <h1 style={{fontFamily: 'Playfair Display', margin: 0, fontSize: '1.2rem'}}>SIWA FINANCE</h1>
                        <div style={{width: '100px'}}></div>
                    </header>

                    <main className="container">
                        <div className="stats-grid">
                            <div className="stat-card card-total">
                                <h3>Ingresos Brutos</h3>
                                <p>₡{metrics.total.toLocaleString('es-CR')}</p>
                                <span className="txt-small">Total en caja (con IVA)</span>
                            </div>
                            <div className="stat-card card-iva">
                                <h3>IVA (13%)</h3>
                                <p>₡{Math.round(metrics.iva).toLocaleString('es-CR')}</p>
                                <span className="txt-small">Impuesto a declarar</span>
                            </div>
                            <div className="stat-card card-profit">
                                <h3>Ganancia Real</h3>
                                <p>₡{Math.round(metrics.profit).toLocaleString('es-CR')}</p>
                                <span className="txt-small">Utilidad (Venta neta sin IVA)</span>
                            </div>
                            <div className="stat-card card-pending">
                                <h3>Por Confirmar</h3>
                                <p>{metrics.pending}</p>
                                <span className="txt-small">Órdenes pendientes</span>
                            </div>
                        </div>

                        <div className="table-container">
                            {loading ? (
                                <p style={{padding: '40px', textAlign: 'center'}}>Cargando transacciones...</p>
                            ) : (
                                <table>
                                    <thead>
                                        <tr>
                                            <th>Fecha y Cliente</th>
                                            <th>Desglose (₡)</th>
                                            <th>Total Cobrado</th>
                                            <th>Estado</th>
                                            <th>Acción</th>
                                        </tr>
                                    </thead>
                                    <tbody>
                                        {sales.length === 0 ? (
                                            <tr><td colSpan="5" style={{textAlign: 'center', padding: '20px'}}>No hay registros.</td></tr>
                                        ) : (
                                            sales.map(sale => {
                                                const monto = Number(sale.total_amount || 0);
                                                const subtotal = monto / 1.13;
                                                const iva = monto - subtotal;
                                                // Ganancia de la fila individual (Precio sin IVA)
                                                const gananciaFila = subtotal;

                                                return (
                                                    <tr key={sale.id}>
                                                        <td>
                                                            <strong>{sale.customer_name || 'Cliente Web'}</strong>
                                                            <span className="txt-small">{new Date(sale.created_at).toLocaleDateString()}</span>
                                                        </td>
                                                        <td>
                                                            <div className="txt-small">Base: ₡{Math.round(subtotal).toLocaleString()}</div>
                                                            <div className="txt-small">IVA: ₡{Math.round(iva).toLocaleString()}</div>
                                                            <div className="txt-small" style={{color: 'var(--verde-fino)', fontWeight: '600'}}>
                                                                Subtotal neto: ₡{Math.round(gananciaFila).toLocaleString()}
                                                            </div>
                                                        </td>
                                                        <td style={{ fontWeight: '600' }}>
                                                            ₡{monto.toLocaleString('es-CR')}
                                                        </td>
                                                        <td>
                                                            <span className={`badge badge-${sale.status}`}>
                                                                {sale.status === 'pending' ? 'Pendiente' : 
                                                                 sale.status === 'completed' ? 'Pagado' : 'Cancelado'}
                                                            </span>
                                                        </td>
                                                        <td className="actions-cell">
                                                            {sale.status === 'pending' ? (
                                                                <>
                                                                    <button className="btn-confirm" onClick={() => confirmSale(sale)}>
                                                                        Confirmar Pago
                                                                    </button>
                                                                    <button className="btn-cancel" onClick={() => cancelSale(sale.id)}>
                                                                        No se completó
                                                                    </button>
                                                                </>
                                                            ) : (
                                                                <span style={{color: '#bdc3c7', fontSize: '0.8rem'}}>
                                                                    {sale.status === 'completed' ? '✓ Procesado' : '✕ Anulado'}
                                                                </span>
                                                            )}
                                                        </td>
                                                    </tr>
                                                )
                                            })
                                        )}
                                    </tbody>
                                </table>
                            )}
                        </div>
                    </main>
                </div>
            );
        }
        ReactDOM.createRoot(document.getElementById('root')).render(<App />);
    </script>
</body>
</html>
