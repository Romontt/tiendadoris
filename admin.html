<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Admin | Siwa Boutique</title>
    <link href="https://fonts.googleapis.com/css2?family=Outfit:wght@300;400;600&family=Playfair+Display:wght@700&display=swap" rel="stylesheet">
    <script src="https://unpkg.com/react@18/umd/react.development.js"></script>
    <script src="https://unpkg.com/react-dom@18/umd/react-dom.development.js"></script>
    <script src="https://unpkg.com/@babel/standalone/babel.min.js"></script>
    <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
    <style>
        :root { 
            --bg: #fdfaf7; 
            --card-bg: #ffffff; 
            --accent: #d4a373; /* Dorado suave / Terracota */
            --text: #4a3f35;
            --text-light: #8e8276;
            --danger: #e63946;
        }
        
        body { 
            font-family: 'Outfit', sans-serif; 
            background: var(--bg); 
            margin: 0; 
            display: flex; 
            justify-content: center; 
            align-items: center; 
            min-height: 100vh; 
            color: var(--text); 
        }

        .card { 
            background: var(--card-bg); 
            width: 90%; 
            max-width: 450px; 
            padding: 40px; 
            border-radius: 40px; 
            box-shadow: 0 15px 35px rgba(212, 163, 115, 0.15); 
            text-align: center; 
            border: 1px solid rgba(212, 163, 115, 0.1);
        }

        h2 { font-family: 'Playfair Display', serif; font-size: 2rem; margin-bottom: 10px; color: var(--accent); }
        p { color: var(--text-light); margin-bottom: 30px; }

        input { 
            width: 100%; 
            padding: 16px; 
            margin: 15px 0; 
            border-radius: 15px; 
            border: 1px solid #e9e2db; 
            background: #fff; 
            color: var(--text); 
            box-sizing: border-box; 
            font-size: 1rem;
            outline: none;
            transition: 0.3s;
        }
        input:focus { border-color: var(--accent); box-shadow: 0 0 0 4px rgba(212, 163, 115, 0.1); }

        button.primary { 
            width: 100%; 
            padding: 16px; 
            border-radius: 15px; 
            border: none; 
            background: var(--accent); 
            color: white; 
            font-weight: 600; 
            cursor: pointer; 
            transition: 0.3s; 
            font-size: 1rem;
        }
        button.primary:hover { opacity: 0.9; transform: translateY(-2px); }

        .menu-grid { display: grid; gap: 15px; margin-top: 10px; }
        
        .menu-opt { 
            display: flex;
            align-items: center;
            gap: 15px;
            background: #fff; 
            padding: 20px; 
            border-radius: 20px; 
            text-decoration: none; 
            color: var(--text); 
            border: 1px solid #eeeae5; 
            transition: 0.3s; 
            text-align: left;
        }
        .menu-opt:hover { 
            border-color: var(--accent); 
            background: #fffaf5;
            transform: scale(1.02);
        }
        .icon-box {
            font-size: 1.5rem;
            background: #fdf1e8;
            width: 50px;
            height: 50px;
            display: flex;
            align-items: center;
            justify-content: center;
            border-radius: 12px;
        }

        .logout-btn { 
            background: transparent; 
            border: none; 
            color: var(--text-light); 
            font-size: 0.9rem; 
            margin-top: 25px; 
            cursor: pointer;
            text-decoration: underline;
        }
    </style>
</head>
<body>
    <div id="root"></div>
    <script type="text/babel">
        const { useState, useEffect } = React;
        const _supabase = supabase.createClient('https://hvnpkljyoocqdzwdptgt.supabase.co', 'eyJhbGciOiJIUzI1NiIsInR5cCI6IkpXVCJ9.eyJpc3MiOiJzdXBhYmFzZSIsInJlZiI6Imh2bnBrbGp5b29jcWR6d2RwdGd0Iiwicm9sZSI6ImFub24iLCJpYXQiOjE3NzY2MTAxMTQsImV4cCI6MjA5MjE4NjExNH0.-pq3iVzqJsJCyGNXkFPlHSIQeBTrr7i7ptsY6FYjJZ0');

        function App() {
            const [isLogged, setIsLogged] = useState(sessionStorage.getItem('admin_logged') === 'true');
            const [pass, setPass] = useState('');

            const login = async () => {
                const { data } = await _supabase.from('configuracion').select('valor').eq('clave', 'admin_token').single();
                if (data?.valor === pass) {
                    setIsLogged(true);
                    sessionStorage.setItem('admin_logged', 'true');
                } else {
                    alert("Contraseña incorrecta");
                }
            };

            const logout = () => {
                setIsLogged(false);
                sessionStorage.removeItem('admin_logged');
            };

            if (!isLogged) return (
                <div className="card">
                    <h2>Siwa Boutique</h2>
                    <p>Panel de Administración</p>
                    <input 
                        type="password" 
                        placeholder="Introduce la palabra clave" 
                        onChange={e => setPass(e.target.value)} 
                        onKeyPress={e => e.key === 'Enter' && login()}
                    />
                    <button className="primary" onClick={login}>Iniciar Sesión</button>
                </div>
            );

            return (
                <div className="card">
                    <h2>Hola, Doris</h2>
                    <p>¿Qué haremos en la tienda hoy?</p>
                    
                    <div className="menu-grid">
                        <a href="agregar.html" className="menu-opt">
                            <div className="icon-box">✨</div>
                            <div>
                                <strong style={{display: 'block'}}>Nuevo Producto</strong>
                                <small style={{color: 'var(--text-light)'}}>Subir fotos y precios</small>
                            </div>
                        </a>

                        <a href="administrar.html" className="menu-opt">
                            <div className="icon-box">🏷️</div>
                            <div>
                                <strong style={{display: 'block'}}>Inventario</strong>
                                <small style={{color: 'var(--text-light)'}}>Cambiar tallas y stock</small>
                            </div>
                        </a>

                        <a href="ventas.html" className="menu-opt">
                            <div className="icon-box">💰</div>
                            <div>
                                <strong style={{display: 'block'}}>Ventas y Ganancias</strong>
                                <small style={{color: 'var(--text-light)'}}>Confirmar pedidos de WhatsApp</small>
                            </div>
                        </a>
                    </div>

                    <button onClick={logout} className="logout-btn">Cerrar sesión de forma segura</button>
                </div>
            );
        }
        ReactDOM.createRoot(document.getElementById('root')).render(<App />);
    </script>
</body>
</html>
