<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Admin | SUA Boutique</title>
    <link href="https://fonts.googleapis.com/css2?family=Outfit:wght@300;500;700&display=swap" rel="stylesheet">
    <script src="https://unpkg.com/react@18/umd/react.development.js"></script>
    <script src="https://unpkg.com/react-dom@18/umd/react-dom.development.js"></script>
    <script src="https://unpkg.com/@babel/standalone/babel.min.js"></script>
    <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
    <style>
        :root { --v-fondo: #0a1f1a; --v-card: #0d2c24; --naranja: #d46a4e; }
        body { font-family: 'Outfit', sans-serif; background: var(--v-fondo); margin: 0; display: flex; justify-content: center; align-items: center; min-height: 100vh; color: #f1f5f9; }
        .card { background: var(--v-card); width: 90%; max-width: 400px; padding: 40px; border-radius: 30px; box-shadow: 0 20px 50px rgba(0,0,0,0.5); text-align: center; }
        input { width: 100%; padding: 14px; margin: 15px 0; border-radius: 12px; border: 1px solid rgba(255,255,255,0.1); background: #163d33; color: white; box-sizing: border-box; }
        button { width: 100%; padding: 16px; border-radius: 15px; border: none; background: var(--naranja); color: white; font-weight: 700; cursor: pointer; transition: 0.3s; margin-top: 10px; }
        .menu-grid { display: grid; gap: 20px; margin-top: 30px; }
        .menu-opt { background: #163d33; padding: 25px; border-radius: 20px; text-decoration: none; color: white; border: 1px solid rgba(255,255,255,0.05); transition: 0.3s; }
        .menu-opt:hover { border-color: var(--naranja); background: #1c4d41; }
    </style>
</head>
<body>
    <div id="root"></div>
    <script type="text/babel">
        const { useState } = React;
        const _supabase = supabase.createClient('https://hvnpkljyoocqdzwdptgt.supabase.co', 'eyJhbGciOiJIUzI1NiIsInR5cCI6IkpXVCJ9.eyJpc3MiOiJzdXBhYmFzZSIsInJlZiI6Imh2bnBrbGp5b29jcWR6d2RwdGd0Iiwicm9sZSI6ImFub24iLCJpYXQiOjE3NzY2MTAxMTQsImV4cCI6MjA5MjE4NjExNH0.-pq3iVzqJsJCyGNXkFPlHSIQeBTrr7i7ptsY6FYjJZ0');

        function App() {
            const [isLogged, setIsLogged] = useState(false);
            const [pass, setPass] = useState('');

            const login = async () => {
                const { data } = await _supabase.from('configuracion').select('valor').eq('clave', 'admin_token').single();
                if (data?.valor === pass) setIsLogged(true);
                else alert("Acceso denegado");
            };

            if (!isLogged) return (
                <div className="card">
                    <h2>SUA ADMIN</h2>
                    <input type="password" placeholder="Palabra clave" onChange={e => setPass(e.target.value)} onKeyPress={e => e.key === 'Enter' && login()}/>
                    <button onClick={login}>Entrar al Panel</button>
                </div>
            );

            return (
                <div className="card" style={{maxWidth: '500px'}}>
                    <h2 style={{color: 'var(--naranja)'}}>Bienvenido, Ronald</h2>
                    <p>¿Qué deseas gestionar hoy?</p>
                    <div className="menu-grid">
                        <a href="agregar.html" className="menu-opt">
                            <strong style={{display: 'block', fontSize: '1.2rem'}}>+ Subir Producto</strong>
                            <small style={{opacity: 0.6}}>Añadir nuevas prendas al catálogo</small>
                        </a>
                        <a href="administrar.html" className="menu-opt">
                            <strong style={{display: 'block', fontSize: '1.2rem'}}>⚙️ Administrar</strong>
                            <small style={{opacity: 0.6}}>Editar precios, stock y promociones</small>
                        </a>
                    </div>
                </div>
            );
        }
        ReactDOM.createRoot(document.getElementById('root')).render(<App />);
    </script>
</body>
</html>
